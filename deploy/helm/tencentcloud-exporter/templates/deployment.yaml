apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tencentcloud-exporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tencentcloud-exporter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tencentcloud-exporter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Force pod restart when ConfigMap content changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "tencentcloud-exporter.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "tencentcloud-exporter.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config.file=/etc/tencentcloud-exporter/qcloud.yml
            {{- range .Values.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          {{- if or (include "tencentcloud-exporter.hasSecret" .) .Values.env }}
          env:
            {{- if include "tencentcloud-exporter.hasSecret" . }}
            - name: TENCENTCLOUD_SECRET_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "tencentcloud-exporter.secretName" . }}
                  key: access-key
            - name: TENCENTCLOUD_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tencentcloud-exporter.secretName" . }}
                  key: secret-key
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          ports:
            - name: metrics
              containerPort: 9123
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/tencentcloud-exporter
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "tencentcloud-exporter.fullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

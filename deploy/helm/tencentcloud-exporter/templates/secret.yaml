{{- if and (not .Values.config.credential.existingSecret) .Values.config.credential.accessKey .Values.config.credential.secretKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tencentcloud-exporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tencentcloud-exporter.labels" . | nindent 4 }}
type: Opaque
stringData:
  access-key: {{ .Values.config.credential.accessKey | quote }}
  secret-key: {{ .Values.config.credential.secretKey | quote }}
{{- end }}
